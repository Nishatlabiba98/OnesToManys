<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homestead API Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Mulish:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --barn:    #1a0f0a;
    --wood:    #2d1a0e;
    --plank:   #3d2512;
    --beam:    #5c3a1e;
    --rust:    #8b3a1a;
    --ember:   #c4622d;
    --amber:   #d4883a;
    --gold:    #e8b84b;
    --hay:     #f0d080;
    --cream:   #f5ead0;
    --iron:    #4a3828;
    --ash:     #7a6a58;
    --fog:     #a08870;
    --serif:   'Playfair Display', serif;
    --sans:    'Mulish', sans-serif;
    --mono:    'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--barn);
    background-image:
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(93,58,30,0.06) 80px, rgba(93,58,30,0.06) 82px),
      repeating-linear-gradient(180deg, transparent, transparent 120px, rgba(93,58,30,0.04) 120px, rgba(93,58,30,0.04) 122px);
    color: var(--cream);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 270px 1fr;
    grid-template-rows: 64px 1fr;
    grid-template-areas: "header header" "sidebar main";
    height: 100vh;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    grid-area: header;
    background: linear-gradient(180deg, #120a05 0%, var(--wood) 100%);
    border-bottom: 1px solid var(--beam);
    box-shadow: 0 2px 20px rgba(0,0,0,0.5), inset 0 -1px 0 rgba(228,184,75,0.1);
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px;
  }

  header .logo {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(228,184,75,0.4);
  }

  header .logo span { color: var(--fog); font-weight: 400; font-style: italic; font-size: 1rem; margin-left: 4px; }

  header .base-url-wrap {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px;
  }

  header .base-url-wrap label {
    color: var(--fog); font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px;
    font-family: var(--sans);
  }

  header input.base-url {
    background: rgba(10,5,2,0.5);
    border: 1px solid var(--iron);
    color: var(--gold);
    padding: 6px 12px; border-radius: 4px;
    font-family: var(--mono); font-size: 12px; width: 230px;
    transition: border-color 0.15s;
  }
  header input.base-url:focus { outline: none; border-color: var(--amber); }

  /* ── SIDEBAR ── */
  aside {
    grid-area: sidebar;
    background: linear-gradient(180deg, var(--wood) 0%, #1f0f08 100%);
    border-right: 1px solid var(--beam);
    overflow-y: auto; padding: 12px 0;
    box-shadow: inset -1px 0 0 rgba(228,184,75,0.05);
  }

  .section-label {
    font-family: var(--sans);
    font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--ash);
    padding: 14px 18px 6px;
  }

  .endpoint-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 9px 18px;
    background: none; border: none; cursor: pointer;
    text-align: left; color: var(--fog);
    font-family: var(--sans); font-size: 12.5px;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }

  .endpoint-btn:hover {
    background: rgba(228,184,75,0.06);
    color: var(--hay);
  }

  .endpoint-btn.active {
    background: rgba(228,184,75,0.1);
    color: var(--gold);
  }

  .endpoint-btn.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    border-radius: 0 2px 2px 0;
  }

  .method-badge {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px; min-width: 44px;
    text-align: center; flex-shrink: 0; letter-spacing: 0.5px;
  }

  .GET    { background: rgba(93,58,30,0.5);  color: var(--gold); border: 1px solid rgba(228,184,75,0.2); }
  .POST   { background: rgba(139,58,26,0.4); color: var(--hay);  border: 1px solid rgba(196,98,45,0.3); }
  .PUT    { background: rgba(45,26,14,0.6);  color: var(--amber); border: 1px solid rgba(212,136,58,0.3); }
  .DELETE { background: rgba(80,20,10,0.5);  color: #e87a6a;     border: 1px solid rgba(196,80,60,0.3); }

  /* ── MAIN ── */
  main {
    grid-area: main;
    display: grid; grid-template-rows: auto minmax(0, 1fr);
    overflow: hidden;
  }

  .request-panel {
    display: flex; flex-direction: column;
    padding: 14px 18px;
    border-bottom: 1px solid var(--beam);
    background: linear-gradient(180deg, var(--wood) 0%, var(--plank) 100%);
  }

  .response-panel {
    display: flex; flex-direction: column;
    overflow: hidden;
    padding: 14px 18px;
    background: var(--barn);
  }

  .panel-title {
    font-family: var(--sans);
    font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--ash);
    margin-bottom: 10px;
  }

  /* curl row */
  .curl-row {
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }

  .curl-box {
    flex: 1;
    background: rgba(10,5,2,0.6);
    border: 1px solid var(--iron);
    color: var(--amber);
    padding: 8px 12px; border-radius: 4px;
    font-family: var(--mono); font-size: 11px;
    white-space: nowrap; overflow-x: auto;
  }

  .copy-btn {
    background: rgba(74,56,40,0.4);
    border: 1px solid var(--iron);
    color: var(--fog);
    padding: 7px 12px; border-radius: 4px;
    font-family: var(--mono); font-size: 10px;
    cursor: pointer; flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s;
  }
  .copy-btn:hover { color: var(--gold); border-color: var(--amber); }
  .copy-btn.copied { color: var(--gold); border-color: var(--gold); }

  /* url bar */
  .url-bar { display: flex; gap: 8px; margin-bottom: 10px; }

  .method-display {
    background: rgba(10,5,2,0.5);
    border: 1px solid var(--iron);
    padding: 0 14px; border-radius: 4px;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    display: flex; align-items: center;
    min-width: 80px; justify-content: center;
    color: var(--gold);
  }

  .url-bar input {
    flex: 1;
    background: rgba(10,5,2,0.4);
    border: 1px solid var(--iron);
    color: var(--cream);
    padding: 10px 14px; border-radius: 4px;
    font-family: var(--mono); font-size: 12px;
    transition: border-color 0.15s;
  }
  .url-bar input:focus { outline: none; border-color: var(--amber); }

  .send-btn {
    background: linear-gradient(135deg, var(--ember), var(--rust));
    color: var(--cream);
    border: none; padding: 10px 28px; border-radius: 4px;
    font-family: var(--sans); font-weight: 700; font-size: 13px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(139,58,26,0.4);
    transition: all 0.15s; letter-spacing: 0.5px;
  }
  .send-btn:hover {
    background: linear-gradient(135deg, var(--amber), var(--ember));
    box-shadow: 0 6px 18px rgba(196,98,45,0.5);
    transform: translateY(-1px);
  }
  .send-btn:active { transform: scale(0.98); }

  /* body textarea */
  .body-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ash); margin-bottom: 4px; font-family: var(--sans);
  }

  textarea.body-input {
    background: rgba(10,5,2,0.5);
    border: 1px solid var(--iron);
    color: #c8a870;
    padding: 12px; border-radius: 4px;
    font-family: var(--mono); font-size: 12px;
    resize: vertical; line-height: 1.6;
    height: calc(1.6em * 7 + 24px);
    max-height: calc(1.6em * 7 + 24px);
    min-height: calc(1.6em * 7 + 24px);
    overflow-y: auto;
    transition: border-color 0.15s;
  }
  textarea.body-input:focus { outline: none; border-color: var(--amber); }

  /* response */
  .response-meta {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 10px;
  }

  .status-badge {
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 3px;
  }
  .status-2xx     { background: rgba(93,58,30,0.5); color: var(--gold); border: 1px solid rgba(228,184,75,0.2); }
  .status-4xx     { background: rgba(80,20,10,0.5); color: #e87a6a;    border: 1px solid rgba(196,80,60,0.2); }
  .status-5xx     { background: rgba(100,50,10,0.5); color: var(--amber); border: 1px solid rgba(212,136,58,0.2); }
  .status-pending { background: rgba(74,56,40,0.3); color: var(--ash);  border: 1px solid var(--iron); }

  .timing { font-family: var(--mono); font-size: 10px; color: var(--ash); }

  .response-body {
    flex: 1; overflow-y: auto;
    background: rgba(10,5,2,0.5);
    border: 1px solid var(--iron);
    border-radius: 4px; padding: 14px;
    font-family: var(--mono); font-size: 12px; line-height: 1.7;
    white-space: pre-wrap; min-height: 80px;
    color: var(--hay);
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--barn); }
  ::-webkit-scrollbar-thumb { background: var(--iron); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--beam); }
</style>
</head>
<body>

<header>
  <div class="logo">🌾 Homestead <span>API Tester</span></div>
  <div class="base-url-wrap">
    <label>Base URL</label>
    <input class="base-url" id="baseUrl" value="http://localhost:8080">
  </div>
</header>

<aside id="sidebar"></aside>

<main>
  <div class="request-panel">
    <div class="panel-title">Request</div>
    <div class="curl-row">
      <div class="curl-box" id="curlBox">— select an endpoint to generate curl command —</div>
      <button class="copy-btn" id="copyBtn" onclick="copyCurl()">copy curl</button>
    </div>
    <div class="url-bar">
      <div class="method-display" id="methodDisplay">—</div>
      <input id="urlInput" type="text" placeholder="Select an endpoint from the sidebar">
      <button class="send-btn" onclick="sendRequest()">Send</button>
    </div>
    <div class="body-section">
      <div class="body-label">Request Body (JSON)</div>
      <textarea class="body-input" id="bodyInput" placeholder="{}"></textarea>
    </div>
  </div>

  <div class="response-panel">
    <div class="panel-title">Response</div>
    <div class="response-meta">
      <div class="status-badge status-pending" id="statusBadge">—</div>
      <div class="timing" id="timingDisplay"></div>
    </div>
    <div class="response-body" id="responseBody">Select an endpoint and click Send.</div>
  </div>
</main>

<script>
const ENDPOINTS = [
  // Builders
  { tag: "Builders", method: "GET",    path: "/api/builders",
    body: null, desc: "List all builders" },
  { tag: "Builders", method: "GET",    path: "/api/builders/{id}",
    body: null, desc: "Get builder by ID" },
  { tag: "Builders", method: "GET",    path: "/api/builders/export",
    body: null, desc: "Export all (dump)" },
  { tag: "Builders", method: "POST",   path: "/api/builders",
    body: JSON.stringify({ name: "Labiba", vision: "Peaceful homes for everyone", location: "Ogden, UT", icon: "🌸" }, null, 2),
    desc: "Create builder" },
  { tag: "Builders", method: "PUT",    path: "/api/builders/{id}",
    body: JSON.stringify({ name: "Nishat", vision: "Cozy family spaces with heart", location: "Salt Lake City, UT", icon: "🏡" }, null, 2),
    desc: "Update builder" },
  { tag: "Builders", method: "DELETE", path: "/api/builders/{id}",
    body: null, desc: "Delete builder" },

  // Building Plans
  { tag: "Building Plans", method: "GET",    path: "/api/plans",
    body: null, desc: "List all plans" },
  { tag: "Building Plans", method: "GET",    path: "/api/plans/{id}",
    body: null, desc: "Get plan by ID" },
  { tag: "Building Plans", method: "GET",    path: "/api/builders/{id}/plans",
    body: null, desc: "Plans by builder ⭐" },
  { tag: "Building Plans", method: "POST",   path: "/api/plans",
    body: JSON.stringify({ title: "The Meadow", style: "Ranch", squareFeet: 2000, notes: "Open fields, great for kids", icon: "🌾", builder: { id: 1 } }, null, 2),
    desc: "Create plan" },
  { tag: "Building Plans", method: "PUT",    path: "/api/plans/{id}",
    body: JSON.stringify({ title: "The Meadow", style: "Ranch", squareFeet: 2200, notes: "Updated layout", icon: "🌾" }, null, 2),
    desc: "Update plan" },
  { tag: "Building Plans", method: "DELETE", path: "/api/plans/{id}",
    body: null, desc: "Delete plan" },
];

let currentMethod = "GET";

function buildSidebar() {
  const sidebar = document.getElementById("sidebar");
  let lastTag = "";
  ENDPOINTS.forEach((ep, i) => {
    if (ep.tag !== lastTag) {
      const lbl = document.createElement("div");
      lbl.className = "section-label";
      lbl.textContent = ep.tag;
      sidebar.appendChild(lbl);
      lastTag = ep.tag;
    }
    const btn = document.createElement("button");
    btn.className = "endpoint-btn";
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="method-badge ${ep.method}">${ep.method}</span>${ep.desc}`;
    btn.onclick = () => selectEndpoint(i);
    sidebar.appendChild(btn);
  });
}

function selectEndpoint(idx) {
  document.querySelectorAll(".endpoint-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".endpoint-btn")[idx].classList.add("active");

  const ep = ENDPOINTS[idx];
  currentMethod = ep.method;

  const base = document.getElementById("baseUrl").value.replace(/\/$/, "");
  let path = ep.path;
  if (path.includes("{id}")) {
    const id = prompt(`Enter the ID for: ${ep.desc}`, "1");
    if (!id) return;
    path = path.replace("{id}", id);
  }

  const url = base + path;
  document.getElementById("methodDisplay").textContent = ep.method;
  document.getElementById("methodDisplay").className = `method-display ${ep.method}`;
  document.getElementById("urlInput").value = url;
  document.getElementById("bodyInput").value = ep.body || "";
  updateCurl();

  document.getElementById("statusBadge").textContent = "—";
  document.getElementById("statusBadge").className = "status-badge status-pending";
  document.getElementById("timingDisplay").textContent = "";
  document.getElementById("responseBody").textContent = "Click Send to execute.";
}

function updateCurl() {
  const url = document.getElementById("urlInput").value;
  const method = currentMethod;
  const body = document.getElementById("bodyInput").value.trim();
  let cmd = `curl -s -X ${method} "${url}" -H "Accept: application/json"`;
  if (["POST", "PUT"].includes(method) && body) {
    cmd += ` -H "Content-Type: application/json" -d '${body.replace(/'/g, "\\'")}'`;
  }
  document.getElementById("curlBox").textContent = cmd;
}

document.getElementById("urlInput").addEventListener("input", updateCurl);
document.getElementById("bodyInput").addEventListener("input", updateCurl);

async function sendRequest() {
  const url = document.getElementById("urlInput").value;
  const method = currentMethod;
  const rawBody = document.getElementById("bodyInput").value.trim();
  if (!url) return;

  const start = performance.now();
  const opts = { method, headers: { "Accept": "application/json" } };
  if (["POST", "PUT"].includes(method) && rawBody) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = rawBody;
  }

  const rb = document.getElementById("responseBody");
  rb.textContent = "Sending…";

  try {
    const res = await fetch(url, opts);
    const ms = Math.round(performance.now() - start);
    const badge = document.getElementById("statusBadge");
    badge.textContent = `${res.status} ${res.statusText}`;
    badge.className = "status-badge " + (res.ok ? "status-2xx" : res.status >= 500 ? "status-5xx" : "status-4xx");
    document.getElementById("timingDisplay").textContent = `${ms} ms`;

    const text = await res.text();
    rb.textContent = text || "(empty body)";
    try {
      if (/^[\s\n\r]*[\[{]/.test(text)) {
        rb.textContent = JSON.stringify(JSON.parse(text), null, 2);
      }
    } catch { }
  } catch (err) {
    document.getElementById("statusBadge").textContent = "Error";
    document.getElementById("statusBadge").className = "status-badge status-4xx";
    rb.textContent = `Network error: ${err.message}\n\nMake sure Spring Boot is running at ${document.getElementById("baseUrl").value}`;
  }
}

function copyCurl() {
  const txt = document.getElementById("curlBox").textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "copy curl"; btn.classList.remove("copied"); }, 1500);
  });
}

buildSidebar();
</script>
</body>
</html>
